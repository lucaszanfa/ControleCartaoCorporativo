<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Conciliação de Cartões</title><link rel="stylesheet" href="css/style.css"></head>
<body>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <header class="topbar"><div><span class="eyebrow">Fatura x compras registradas</span><h1>Conciliação</h1><p class="topbar-subtitle">Mostra transações da fatura que ainda precisam de correção ou complemento.</p></div><span class="user-chip">Usuário</span></header>
      <section class="card"><div class="filters-row"><label>Status <select id="filtroStatus"><option value="">Todas as pendências</option><option value="sem_registro">Sem registro</option><option value="valor_divergente">Valor divergente</option><option value="data_divergente">Data divergente</option><option value="aguardando_comprovante">Aguardando comprovante</option></select></label><label>Cartão <select id="filtroCartao"><option value="">Todos</option></select></label></div></section>
      <section class="card"><div class="table-wrapper"><table><thead><tr><th>Data fatura</th><th>Estabelecimento</th><th>Valor</th><th>Cartão</th><th>Compra encontrada</th><th>Responsável</th><th>Status</th><th>Ações</th></tr></thead><tbody id="conciliacoesTabela"></tbody></table></div></section>
    </main>
  </div>
  <script src="js/dados.js"></script><script src="js/auth.js"></script><script src="js/cartoes-utils.js"></script><script src="js/conciliacao-cartao.js"></script>
</body>
</html>
