<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alertas de Cartão</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <header class="topbar">
        <div>
          <span class="eyebrow">Pendências e Teams</span>
          <h1>Alertas de cartão</h1>
        </div>
        <span class="user-chip">Usuário</span>
      </header>

      <section class="card">
        <div id="alertaMensagem" class="alert-success hidden"></div>
        <div class="filters-row">
          <label>Status
            <select id="filtroStatus">
              <option value="abertos" selected>Abertos</option>
              <option value="todos">Todos</option>
              <option value="pendente">Pendente</option>
              <option value="enviado">Enviado</option>
              <option value="em_analise">Em análise</option>
              <option value="resolvido">Resolvido</option>
            </select>
          </label>
          <label>Tipo
            <select id="filtroTipo">
              <option value="">Todos</option>
              <option value="compra_sem_registro">Compra sem registro</option>
              <option value="compra_sem_comprovante">Sem comprovante</option>
              <option value="valor_divergente">Valor divergente</option>
              <option value="data_divergente">Data divergente</option>
            </select>
          </label>
        </div>
      </section>

      <section class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Data</th>
                <th>Departamento</th>
                <th>Cartão</th>
                <th>Tipo</th>
                <th>Estabelecimento</th>
                <th>Valor</th>
                <th>Status</th>
                <th>Teams</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="alertasTabela"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="js/dados.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cartoes-utils.js"></script>
  <script src="js/alertas-cartao.js"></script>
</body>
</html>
